<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HNG Todo Card</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <article data-testid="test-todo-card" id="todo-card">


    <div id="card-view">

      <div class="top">
        <label for="done" class="sr-only">Mark task as complete</label>
        <input type="checkbox" id="done" data-testid="test-todo-complete-toggle" aria-label="Mark task as complete">
        <h2 data-testid="test-todo-title" id="todo-title">Redesign the onboarding flow</h2>
        <div class="btns">
          <button data-testid="test-todo-edit-button" id="edit-btn" aria-label="Edit task">Edit</button>
          <button data-testid="test-todo-delete-button" aria-label="Delete task">Delete</button>
        </div>
      </div>

      <div data-testid="test-todo-collapsible-section" id="collapsible-section" class="collapsible">
        <p data-testid="test-todo-description" id="todo-description">
          Audit the current 7-step onboarding and cut friction where it hurts. Progressive disclosure, tighter copy, and a cleaner first-run experience.
        </p>
      </div>
      <button
        data-testid="test-todo-expand-toggle"
        id="expand-toggle"
        class="expand-btn"
        aria-expanded="false"
        aria-controls="collapsible-section"
        hidden
      >Show more</button>

      <div class="row">
        <span data-testid="test-todo-priority-indicator" id="priority-indicator" class="priority-dot" aria-hidden="true"></span>
        <span data-testid="test-todo-priority" class="pill" id="priority-badge" aria-label="Priority: High">High</span>
        <span data-testid="test-todo-status" class="status-pill" id="status-badge">In Progress</span>
        <label for="status-control" class="sr-only">Change status</label>
        <select data-testid="test-todo-status-control" id="status-control" aria-label="Change task status" class="status-select">
          <option value="Pending">Pending</option>
          <option value="In Progress" selected>In Progress</option>
          <option value="Done">Done</option>
        </select>
      </div>

      <hr>

      <div class="meta">
        <time data-testid="test-todo-due-date" id="due-date-display" datetime="2026-04-18T18:00:00Z">Due Apr 18, 2026</time>
        <div class="time-badges">
          <span data-testid="test-todo-overdue-indicator" id="overdue-indicator" class="overdue-badge" hidden>Overdue</span>
          <span data-testid="test-todo-time-remaining" id="timer" role="status" aria-live="polite"></span>
        </div>
      </div>

      <ul data-testid="test-todo-tags" role="list" aria-label="Tags">
        <li><span data-testid="test-todo-tag-work">work</span></li>
        <li><span data-testid="test-todo-tag-urgent">urgent</span></li>
        <li><span data-testid="test-todo-tag-design">design</span></li>
      </ul>

    </div>


     <section aria-label="Edit form">
    <form data-testid="test-todo-edit-form" id="edit-form" hidden>

      <p class="edit-heading">Edit Task</p>

      <div class="form-field">
        <label for="edit-title">Title</label>
        <input type="text" id="edit-title" data-testid="test-todo-edit-title-input" autocomplete="off">
      </div>

      <div class="form-field">
        <label for="edit-desc">Description</label>
        <textarea id="edit-desc" data-testid="test-todo-edit-description-input" rows="3"></textarea>
      </div>

      <div class="form-row">
        <div class="form-field">
          <label for="edit-priority">Priority</label>
          <select id="edit-priority" data-testid="test-todo-edit-priority-select">
            <option value="Low">Low</option>
            <option value="Medium">Medium</option>
            <option value="High">High</option>
          </select>
        </div>
        <div class="form-field">
          <label for="edit-due">Due date</label>
          <input type="date" id="edit-due" data-testid="test-todo-edit-due-date-input">
        </div>
      </div>

      <div class="form-actions">
        <button type="submit" data-testid="test-todo-save-button" id="save-btn">Save</button>
        <button data-testid="test-todo-cancel-button" id="cancel-btn" type="button">Cancel</button>
      </div>

    </form>
    </section>

  </article>

  <script src="script.js"></script>
</body>
</html>
