<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HNG Todo Card</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;1,400&family=Plus+Jakarta+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <article data-testid="test-todo-card">

    <div class="top">
      <label for="done">
        <input type="checkbox" id="done" data-testid="test-todo-complete-toggle" aria-label="Mark task as complete">
      </label>
      <h2 data-testid="test-todo-title">Redesign the onboarding flow</h2>
      <div class="btns">
        <button data-testid="test-todo-edit-button" aria-label="Edit task">Edit</button>
        <button data-testid="test-todo-delete-button" aria-label="Delete task">Delete</button>
      </div>
    </div>

    <p data-testid="test-todo-description">
      Audit the current 7-step onboarding and cut friction where it hurts. Progressive disclosure, tighter copy, and a cleaner first-run experience.
    </p>

    <div class="row">
      <span data-testid="test-todo-priority" class="pill high" aria-label="Priority: High">High</span>
      <span data-testid="test-todo-status" class="status-pill" id="status-badge">In Progress</span>
    </div>

    <hr>

    <div class="meta">
      <time data-testid="test-todo-due-date" datetime="2026-04-18T18:00:00Z">Due Apr 18, 2026</time>
      <span data-testid="test-todo-time-remaining" id="timer" role="status" aria-live="polite"></span>
    </div>

    <ul data-testid="test-todo-tags" role="list" aria-label="Tags">
      <li><span data-testid="test-todo-tag-work">work</span></li>
      <li><span data-testid="test-todo-tag-urgent">urgent</span></li>
      <li><span data-testid="test-todo-tag-design">design</span></li>
    </ul>

  </article>

  <script src="script.js"></script>
</body>
</html>
